name: writeup

on:
  push:
    branches: [main]
    paths:
      - "docs/writeup/**"
      - ".github/workflows/writeup.yml"
  pull_request:
    paths:
      - "docs/writeup/**"
      - ".github/workflows/writeup.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build pipeline.pdf
        uses: xu-cheng/latex-action@v3
        with:
          root_file: pipeline.tex
          working_directory: docs/writeup

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-pdf
          path: docs/writeup/pipeline.pdf
