# 39-galaxy study sample for the Stage 0a registry build.
# Per docs/plan/data_sources.md "Per-galaxy assignment for the current study sample".
#
# Each entry maps:
#   - study_name        : the long human-readable name used in plots / tables
#   - lvdb_key          : the LVDB v1.0.5 `key` column value (verified against
#                         data/lvdb_v1.0.5/comb_all.csv on 2026-05-05)
#   - path              : "A" (Geha 2026 Paper I DEIMOS) or "B" (LVDB ref_vlos paper)
#   - geha_galaxy       : Path A only — Paper II Table A1 abbrev. matching the
#                         `Galaxy` column of data/geha2026/table3A_20260110.csv
#                         (verified against actual unique values on 2026-05-05).
#                         Required for Path A; absent / null for Path B.

